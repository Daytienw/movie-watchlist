spring.application.name=movie-watchlist
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/movie-watchlist-db
spring.datasource.username=day
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# OMDb API Configuration
omdb.api.base-url=https://omdbapi.com
omdb.api.key=${OMDB_API_KEY}

# JWT Configuration
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

# Browser origins allowed to call this API (comma-separated).
# Defaults to the Next.js dev server in frontend/.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
